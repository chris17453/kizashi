name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kizashi
          POSTGRES_PASSWORD: kizashi
          POSTGRES_DB: kizashi
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U kizashi"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      rabbitmq:
        image: rabbitmq:3-management-alpine
        env:
          RABBITMQ_DEFAULT_USER: kizashi
          RABBITMQ_DEFAULT_PASS: kizashi
        ports: ["5672:5672", "15672:15672"]
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      clickhouse:
        image: clickhouse/clickhouse-server:24-alpine
        env:
          CLICKHOUSE_USER: kizashi
          CLICKHOUSE_PASSWORD: kizashi
          CLICKHOUSE_DB: kizashi
        ports: ["8123:8123", "9000:9000"]

    steps:
      - uses: actions/checkout@v4

      # minio/minio's image needs an explicit `server /data` command, which the `services:`
      # block above can't override (no `command:` key in that schema) — so it's started as a
      # plain docker run step instead, same image as docker-compose.yml's minio service
      # (ADR-0011, retention-service's S3-compatible archival backend). The root password is
      # generated fresh each run rather than hardcoded, so no secret-shaped literal ever lives
      # in this file (this is a throwaway per-run credential for a container with no data worth
      # protecting, not a real secret — generating it avoids relying on static-secret-scanner
      # path allowlisting, which doesn't reliably suppress new literals here).
      - name: Start MinIO
        run: |
          MINIO_PASSWORD="ci-$(openssl rand -hex 16)"
          docker run -d --name minio -p 9100:9000 \
            -e MINIO_ROOT_USER=kizashi \
            -e MINIO_ROOT_PASSWORD="$MINIO_PASSWORD" \
            minio/minio:latest server /data
          until curl -sf http://localhost:9100/minio/health/live >/dev/null; do sleep 1; done
          echo "AWS_SECRET_ACCESS_KEY=$MINIO_PASSWORD" >> "$GITHUB_ENV"

      # Same rationale as MinIO above: connector-fabric's live integration test needs a real
      # TDS server (a plain SQL Server stands in for Fabric's SQL analytics endpoint, since
      # both speak TDS — ADR-0013). Started via `docker run` rather than `services:` so the SA
      # password can be generated at runtime instead of a literal in this file.
      - name: Start SQL Server (TDS stand-in for Fabric)
        run: |
          MSSQL_PASSWORD="Ci-$(openssl rand -hex 16)"
          docker run -d --name mssql -p 14330:1433 \
            -e ACCEPT_EULA=Y \
            -e MSSQL_SA_PASSWORD="$MSSQL_PASSWORD" \
            mcr.microsoft.com/mssql/server:2022-latest
          for i in $(seq 1 60); do
            (echo > /dev/tcp/127.0.0.1/14330) >/dev/null 2>&1 && break
            sleep 1
          done
          sleep 15

      # Same rationale as MinIO/SQL Server above: connector-imap's live integration test needs
      # a real IMAP server (ADR-0022) — greenmail is a small, fast-starting IMAP+SMTP test
      # server built exactly for this. Seeds one message via SMTP so the "poll returns a real
      # message" test has something to find.
      - name: Start greenmail (IMAP test server)
        run: |
          docker run -d --name greenmail -p 13143:3143 -p 13025:3025 \
            -e GREENMAIL_OPTS='-Dgreenmail.setup.test.smtp -Dgreenmail.setup.test.imap -Dgreenmail.users=testuser:testpass@example.com -Dgreenmail.hostname=0.0.0.0' \
            greenmail/standalone:2.0.1
          for i in $(seq 1 30); do
            (echo > /dev/tcp/127.0.0.1/13143) >/dev/null 2>&1 && break
            sleep 1
          done
          printf 'From: sender@example.com\r\nTo: testuser@example.com\r\nSubject: Live IMAP connector test\r\nDate: Wed, 15 Jan 2025 10:00:00 +0000\r\n\r\nCI-seeded test message.\r\n' \
            | curl -s --url "smtp://127.0.0.1:13025" --mail-from "sender@example.com" --mail-rcpt "testuser@example.com" --upload-file -

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and target dir
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Install cargo-audit and cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit,cargo-deny

      - name: Run ci-local.sh
        env:
          DATABASE_URL: postgres://kizashi:kizashi@localhost:5432/kizashi
          RABBITMQ_URL: amqp://kizashi:kizashi@localhost:5672/%2f
          RABBITMQ_MANAGEMENT_URL: http://kizashi:kizashi@localhost:15672
          CLICKHOUSE_URL: http://kizashi:kizashi@localhost:8123
          AWS_REGION: us-east-1
          S3_ENDPOINT_URL: http://localhost:9100
          AWS_S3_BUCKET: kizashi-archive
          AWS_ACCESS_KEY_ID: kizashi
          # AWS_SECRET_ACCESS_KEY is set by the "Start MinIO" step via $GITHUB_ENV
          FABRIC_TEST_HOST: 127.0.0.1
          FABRIC_TEST_PORT: "14330"
          IMAP_TEST_HOST: 127.0.0.1
          IMAP_TEST_PORT: "13143"
          IMAP_TEST_USERNAME: testuser
          IMAP_TEST_PASSWORD: testpass
        run: ./scripts/ci-local.sh
