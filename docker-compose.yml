services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kizashi
      POSTGRES_PASSWORD: kizashi
      POSTGRES_DB: kizashi
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kizashi"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: kizashi
      RABBITMQ_DEFAULT_PASS: kizashi
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    environment:
      CLICKHOUSE_USER: kizashi
      CLICKHOUSE_PASSWORD: kizashi
      CLICKHOUSE_DB: kizashi
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "127.0.0.1:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9101"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-kizashi}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:?set AWS_SECRET_ACCESS_KEY in .env, see .env.example}
    ports:
      - "${MINIO_PORT:-9100}:9000"
      - "${MINIO_CONSOLE_PORT:-9101}:9101"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  # --- Application services ---------------------------------------------------------------
  # All thirteen services build from the one shared root Dockerfile (--build-arg BIN=<name>
  # selects which binary), matching the port map and dependency order already established in
  # scripts/run-local.sh (that script is the source of truth this file mirrors). Internal
  # inter-service URLs use the compose network's service-name DNS, not localhost.

  ingestion-service:
    build: { context: ., args: { BIN: ingestion-service } }
    environment:
      BIND_ADDR: "0.0.0.0:8080"
      DATABASE_URL: postgres://kizashi:kizashi@postgres:5432/kizashi
      RABBITMQ_URL: amqp://kizashi:kizashi@rabbitmq:5672/%2f
    ports: ["8082:8080"]
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    healthcheck: &healthz
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 5s
      retries: 10

  # RabbitMQ exchanges are declared by their *publisher* on startup; consumers only queue_bind,
  # which requires the exchange to already exist — so normalization-service must wait on
  # ingestion-service being healthy (not just RabbitMQ), and so on down the chain. This
  # ordering constraint was only discovered by actually running the system
  # (scripts/run-local.sh) and has no other source of truth.
  normalization-service:
    build: { context: ., args: { BIN: normalization-service } }
    environment:
      BIND_ADDR: "0.0.0.0:8080"
      DATABASE_URL: postgres://kizashi:kizashi@postgres:5432/kizashi
      RABBITMQ_URL: amqp://kizashi:kizashi@rabbitmq:5672/%2f
      INGESTION_SERVICE_URL: http://ingestion-service:8080
      INTERNAL_API_SECRET: "${INTERNAL_API_SECRET:-change-me-in-production}"
    ports: ["8085:8080"]
    depends_on:
      ingestion-service: { condition: service_healthy }
    healthcheck: *healthz

  analysis-service:
    build: { context: ., args: { BIN: analysis-service } }
    environment:
      BIND_ADDR: "0.0.0.0:8080"
      DATABASE_URL: postgres://kizashi:kizashi@postgres:5432/kizashi
      RABBITMQ_URL: amqp://kizashi:kizashi@rabbitmq:5672/%2f
      AZURE_AI_FOUNDRY_ENDPOINT: "${AZURE_AI_FOUNDRY_ENDPOINT:-}"
      AZURE_AI_FOUNDRY_API_KEY: "${AZURE_AI_FOUNDRY_API_KEY:-}"
      INTERNAL_API_SECRET: "${INTERNAL_API_SECRET:-change-me-in-production}"
    ports: ["8086:8080"]
    depends_on:
      normalization-service: { condition: service_healthy }
      postgres: { condition: service_healthy }
    healthcheck: *healthz

  trigger-engine:
    build: { context: ., args: { BIN: trigger-engine } }
    environment:
      BIND_ADDR: "0.0.0.0:8080"
      DATABASE_URL: postgres://kizashi:kizashi@postgres:5432/kizashi
      RABBITMQ_URL: amqp://kizashi:kizashi@rabbitmq:5672/%2f
      CLICKHOUSE_URL: http://kizashi:kizashi@clickhouse:8123
      INTERNAL_API_SECRET: "${INTERNAL_API_SECRET:-change-me-in-production}"
    ports: ["8087:8080"]
    depends_on:
      analysis-service: { condition: service_healthy }
      clickhouse: { condition: service_healthy }
    healthcheck: *healthz

  action-executor:
    build: { context: ., args: { BIN: action-executor } }
    environment:
      BIND_ADDR: "0.0.0.0:8080"
      DATABASE_URL: postgres://kizashi:kizashi@postgres:5432/kizashi
      RABBITMQ_URL: amqp://kizashi:kizashi@rabbitmq:5672/%2f
      TRIGGER_ENGINE_URL: http://trigger-engine:8080
      INTERNAL_API_SECRET: "${INTERNAL_API_SECRET:-change-me-in-production}"
    ports: ["8088:8080"]
    depends_on:
      trigger-engine: { condition: service_healthy }
    healthcheck: *healthz

  # ADR-0020: shells out to `docker run` against the host's Docker socket to invoke each due
  # Agent's connector, so — unlike every other service — this image needs the Docker CLI and
  # runs as root (mount permissions on /var/run/docker.sock vary by host, but it's reliably
  # accessible to root); do not copy this pattern for any other service without the same need.
  agent-scheduler:
    build:
      context: .
      args: { BIN: agent-scheduler, INSTALL_DOCKER_CLI: "true", RUN_AS_USER: root }
    environment:
      BIND_ADDR: "0.0.0.0:8080"
      DATABASE_URL: postgres://kizashi:kizashi@postgres:5432/kizashi
      RABBITMQ_URL: amqp://kizashi:kizashi@rabbitmq:5672/%2f
      DOCKER_IMAGE_PREFIX: kizashi
      DOCKER_NETWORK: kizashi_default
      INGESTION_GATEWAY_URL: http://ingestion-gateway:8080
      # v1 simplification (see crates/agent-scheduler/src/invoker.rs): one platform-wide key
      # for every scheduled connector, not a per-Agent key lookup. Set this to a real key
      # created via the Console UI's API Keys page before enabling any scheduled Agent.
      INGESTION_GATEWAY_API_KEY: "${AGENT_SCHEDULER_INGESTION_GATEWAY_API_KEY:-}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    healthcheck: *healthz

  dashboard-api:
    build: { context: ., args: { BIN: dashboard-api } }
    environment:
      BIND_ADDR: "0.0.0.0:8080"
      CLICKHOUSE_URL: http://kizashi:kizashi@clickhouse:8123
    ports: ["8084:8080"]
    depends_on:
      clickhouse: { condition: service_healthy }
    healthcheck: *healthz

  # ADR-0021: HTTP CONNECT forward proxy every outbound reqwest::Client (connectors,
  # action-executor's dispatcher) can be pointed at via EGRESS_PROXY_URL. Adoption is opt-in
  # per this ADR's Consequences — nothing here forces any caller to route through it yet.
  egress-gateway:
    build: { context: ., args: { BIN: egress-gateway } }
    environment:
      BIND_ADDR: "0.0.0.0:8080"
      PROXY_BIND_ADDR: "0.0.0.0:3128"
      DATABASE_URL: postgres://kizashi:kizashi@postgres:5432/kizashi
    ports: ["8094:8080", "3128:3128"]
    depends_on:
      postgres: { condition: service_healthy }
    healthcheck: *healthz

  config-admin-service:
    build: { context: ., args: { BIN: config-admin-service } }
    environment:
      BIND_ADDR: "0.0.0.0:8080"
      DATABASE_URL: postgres://kizashi:kizashi@postgres:5432/kizashi
      RABBITMQ_URL: amqp://kizashi:kizashi@rabbitmq:5672/%2f
      INTERNAL_API_SECRET: "${INTERNAL_API_SECRET:-change-me-in-production}"
      CONFIG_ENCRYPTION_KEY: "${CONFIG_ENCRYPTION_KEY:?set CONFIG_ENCRYPTION_KEY in .env, see .env.example}"
    ports: ["8090:8080"]
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    healthcheck: *healthz

  ingestion-gateway:
    build: { context: ., args: { BIN: ingestion-gateway } }
    environment:
      BIND_ADDR: "0.0.0.0:8080"
      DATABASE_URL: postgres://kizashi:kizashi@postgres:5432/kizashi
      INGESTION_SERVICE_URL: http://ingestion-service:8080
      CONFIG_ADMIN_SERVICE_URL: http://config-admin-service:8080
    ports: ["8081:8080"]
    depends_on:
      ingestion-service: { condition: service_healthy }
      config-admin-service: { condition: service_healthy }
    healthcheck: *healthz

  query-gateway:
    build: { context: ., args: { BIN: query-gateway } }
    environment:
      BIND_ADDR: "0.0.0.0:8080"
      DATABASE_URL: postgres://kizashi:kizashi@postgres:5432/kizashi
      DASHBOARD_API_URL: http://dashboard-api:8080
      INTERNAL_API_SECRET: "${INTERNAL_API_SECRET:-change-me-in-production}"
    ports: ["8083:8080"]
    depends_on:
      dashboard-api: { condition: service_healthy }
    healthcheck: *healthz

  retention-service:
    build: { context: ., args: { BIN: retention-service } }
    environment:
      BIND_ADDR: "0.0.0.0:8080"
      DATABASE_URL: postgres://kizashi:kizashi@postgres:5432/kizashi
      INGESTION_SERVICE_URL: http://ingestion-service:8080
      AWS_REGION: "${AWS_REGION:-us-east-1}"
      S3_ENDPOINT_URL: http://minio:9000
      AWS_S3_BUCKET: "${AWS_S3_BUCKET:-kizashi-archive}"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-kizashi}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:?set AWS_SECRET_ACCESS_KEY in .env, see .env.example}"
      INTERNAL_API_SECRET: "${INTERNAL_API_SECRET:-change-me-in-production}"
    ports: ["8091:8080"]
    depends_on:
      ingestion-service: { condition: service_healthy }
      minio: { condition: service_healthy }
    healthcheck: *healthz

  # ADR-0011 point 5: sweep/reimport are HTTP-triggered, not an in-process scheduler — "external
  # scheduling (a Kubernetes CronJob or equivalent)" is the decision. This is that equivalent for
  # the docker-compose deployment target: a minimal sidecar that POSTs /v1/sweep on an interval.
  # The eventual Kubernetes CronJob manifest replaces this container 1:1 without touching
  # retention-service itself, since both just call the same stateless HTTP endpoint.
  retention-sweep-scheduler:
    image: alpine:3.20
    entrypoint: ["/bin/sh", "-c"]
    environment:
      INTERNAL_API_SECRET: "${INTERNAL_API_SECRET:-change-me-in-production}"
    command:
      - |
        apk add --no-cache curl >/dev/null
        echo "retention-sweep-scheduler: sweeping every ${RETENTION_SWEEP_INTERVAL_SECONDS:-3600}s"
        while true; do
          curl -sf -X POST http://retention-service:8080/v1/sweep \
            -H "X-Internal-Secret: $$INTERNAL_API_SECRET" \
            && echo "retention-sweep-scheduler: sweep triggered" \
            || echo "retention-sweep-scheduler: sweep request failed, will retry next interval"
          sleep "${RETENTION_SWEEP_INTERVAL_SECONDS:-3600}"
        done
    depends_on:
      retention-service: { condition: service_healthy }
    restart: unless-stopped

  backup-service:
    build: { context: ., args: { BIN: backup-service, INSTALL_POSTGRES_CLIENT: "true" } }
    environment:
      BIND_ADDR: "0.0.0.0:8080"
      DATABASE_URL: postgres://kizashi:kizashi@postgres:5432/kizashi
      AWS_REGION: "${AWS_REGION:-us-east-1}"
      S3_ENDPOINT_URL: http://minio:9000
      AWS_S3_BUCKET: "${BACKUP_S3_BUCKET:-kizashi-backups}"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-kizashi}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:?set AWS_SECRET_ACCESS_KEY in .env, see .env.example}"
      INTERNAL_API_SECRET: "${INTERNAL_API_SECRET:-change-me-in-production}"
    ports: ["8095:8080"]
    depends_on:
      postgres: { condition: service_healthy }
      minio: { condition: service_healthy }
    healthcheck: *healthz

  # Same "external scheduling, HTTP-triggered" shape as retention-sweep-scheduler (ADR-0011
  # point 5, ADR-0055): a minimal sidecar that POSTs /v1/backup/run on an interval, standing in
  # for a future Kubernetes CronJob.
  backup-scheduler:
    image: alpine:3.20
    entrypoint: ["/bin/sh", "-c"]
    environment:
      INTERNAL_API_SECRET: "${INTERNAL_API_SECRET:-change-me-in-production}"
    command:
      - |
        apk add --no-cache curl >/dev/null
        echo "backup-scheduler: backing up every ${BACKUP_INTERVAL_SECONDS:-86400}s"
        while true; do
          curl -sf -X POST http://backup-service:8080/v1/backup/run \
            -H "X-Internal-Secret: $$INTERNAL_API_SECRET" \
            && echo "backup-scheduler: backup triggered" \
            || echo "backup-scheduler: backup request failed, will retry next interval"
          sleep "${BACKUP_INTERVAL_SECONDS:-86400}"
        done
    depends_on:
      backup-service: { condition: service_healthy }
    restart: unless-stopped

  auth-service:
    build: { context: ., args: { BIN: auth-service } }
    environment:
      BIND_ADDR: "0.0.0.0:8080"
      DATABASE_URL: postgres://kizashi:kizashi@postgres:5432/kizashi
      QUERY_GATEWAY_URL: http://query-gateway:8080
      INTERNAL_API_SECRET: "${INTERNAL_API_SECRET:-change-me-in-production}"
      ENTRA_TENANT_ID: "${ENTRA_TENANT_ID:-}"
      ENTRA_CLIENT_ID: "${ENTRA_CLIENT_ID:-}"
      ENTRA_CLIENT_SECRET: "${ENTRA_CLIENT_SECRET:-}"
      ENTRA_REDIRECT_URL: "${ENTRA_REDIRECT_URL:-}"
    ports: ["8089:8080"]
    depends_on:
      query-gateway: { condition: service_healthy }
    healthcheck: *healthz

  observability:
    build: { context: ., args: { BIN: observability } }
    environment:
      BIND_ADDR: "0.0.0.0:8080"
      RABBITMQ_MANAGEMENT_URL: http://kizashi:kizashi@rabbitmq:15672
      SERVICE_REGISTRY: "ingestion-gateway=http://ingestion-gateway:8080,ingestion-service=http://ingestion-service:8080,query-gateway=http://query-gateway:8080,dashboard-api=http://dashboard-api:8080,normalization-service=http://normalization-service:8080,analysis-service=http://analysis-service:8080,trigger-engine=http://trigger-engine:8080,action-executor=http://action-executor:8080,auth-service=http://auth-service:8080,config-admin-service=http://config-admin-service:8080,retention-service=http://retention-service:8080"
    ports: ["8092:8080"]
    depends_on:
      rabbitmq: { condition: service_healthy }
    healthcheck: *healthz

  kizashi-ui:
    build: { context: ., args: { BIN: kizashi-ui } }
    environment:
      BIND_ADDR: "0.0.0.0:8080"
      AUTH_SERVICE_URL: http://auth-service:8080
      QUERY_GATEWAY_URL: http://query-gateway:8080
      CONFIG_ADMIN_SERVICE_URL: http://config-admin-service:8080
      OBSERVABILITY_URL: http://observability:8080
      INGESTION_SERVICE_URL: http://ingestion-service:8080
      INGESTION_GATEWAY_URL: http://ingestion-gateway:8080
      INGESTION_GATEWAY_PUBLIC_URL: "${INGESTION_GATEWAY_PUBLIC_URL:-http://localhost:8081}"
      ACTION_EXECUTOR_URL: http://action-executor:8080
      RETENTION_SERVICE_URL: http://retention-service:8080
      BACKUP_SERVICE_URL: http://backup-service:8080
      EGRESS_GATEWAY_URL: http://egress-gateway:8080
      TRIGGER_ENGINE_URL: http://trigger-engine:8080
      INTERNAL_API_SECRET: "${INTERNAL_API_SECRET:-change-me-in-production}"
      # Local/dev runs over plain HTTP, so this defaults to false (a Secure cookie a browser
      # won't send over plain HTTP would silently break every login). Set to "true" behind a
      # real TLS-terminating deployment.
      COOKIE_SECURE: "${COOKIE_SECURE:-false}"
      # Sliding idle timeout, in minutes -- an inactive session is signed out automatically
      # instead of living forever until explicit logout/revoke (enterprise session-timeout
      # policy). Any activity resets the clock; defaults to 30.
      SESSION_IDLE_TIMEOUT_MINUTES: "${SESSION_IDLE_TIMEOUT_MINUTES:-30}"
    ports: ["8093:8080"]
    # service_started, not service_healthy: the Console UI calls these over HTTP per-request
    # and already renders per-page/per-widget error states when a backend is unreachable (see
    # the status pill styles in layout.html). Requiring every one of these to pass its own
    # healthcheck before the UI container even starts made the *entire* Console UI unable to
    # (re)start whenever any single backend deep in the chain (e.g. analysis-service, several
    # hops away via trigger-engine/action-executor) was transiently unhealthy — a cascading
    # single-point-of-failure discovered live when analysis-service's health flapped during an
    # incident and took the whole UI down with it. service_started only waits for the container
    # process to begin, preserving sane startup ordering without the hard block.
    depends_on:
      auth-service: { condition: service_started }
      query-gateway: { condition: service_started }
      config-admin-service: { condition: service_started }
      observability: { condition: service_started }
      ingestion-service: { condition: service_started }
      ingestion-gateway: { condition: service_started }
      action-executor: { condition: service_started }
      retention-service: { condition: service_started }
      backup-service: { condition: service_started }
      egress-gateway: { condition: service_started }
      trigger-engine: { condition: service_started }
    healthcheck: *healthz

  # --- Connectors --------------------------------------------------------------------------
  # One-shot CronJob-shaped pollers (spec §3), not long-running services — the `connectors`
  # profile keeps them out of a default `docker compose up`. Run one explicitly with real
  # per-tenant credentials, e.g.:
  #   docker compose run --rm -e TENANT_ID=... -e GENERIC_SOURCE_URL=... \
  #     -e INGESTION_GATEWAY_API_KEY=... generic-connector
  generic-connector:
    build: { context: ., args: { BIN: connector-generic } }
    profiles: ["connectors"]
    environment:
      INGESTION_GATEWAY_URL: http://ingestion-gateway:8080
    depends_on:
      ingestion-gateway: { condition: service_healthy }

  sql-connector:
    build: { context: ., args: { BIN: connector-sql } }
    profiles: ["connectors"]
    environment:
      INGESTION_GATEWAY_URL: http://ingestion-gateway:8080
    depends_on:
      ingestion-gateway: { condition: service_healthy }

  zendesk-connector:
    build: { context: ., args: { BIN: connector-zendesk } }
    profiles: ["connectors"]
    environment:
      INGESTION_GATEWAY_URL: http://ingestion-gateway:8080
    depends_on:
      ingestion-gateway: { condition: service_healthy }

  graph-mail-connector:
    build: { context: ., args: { BIN: connector-graph-mail } }
    profiles: ["connectors"]
    environment:
      INGESTION_GATEWAY_URL: http://ingestion-gateway:8080
    depends_on:
      ingestion-gateway: { condition: service_healthy }

  graph-teams-connector:
    build: { context: ., args: { BIN: connector-graph-teams } }
    profiles: ["connectors"]
    environment:
      INGESTION_GATEWAY_URL: http://ingestion-gateway:8080
    depends_on:
      ingestion-gateway: { condition: service_healthy }

  fabric-connector:
    build: { context: ., args: { BIN: connector-fabric } }
    profiles: ["connectors"]
    environment:
      INGESTION_GATEWAY_URL: http://ingestion-gateway:8080
    depends_on:
      ingestion-gateway: { condition: service_healthy }

  imap-connector:
    build: { context: ., args: { BIN: connector-imap } }
    profiles: ["connectors"]
    environment:
      INGESTION_GATEWAY_URL: http://ingestion-gateway:8080
    depends_on:
      ingestion-gateway: { condition: service_healthy }

volumes:
  postgres_data:
  rabbitmq_data:
  clickhouse_data:
  minio_data:
