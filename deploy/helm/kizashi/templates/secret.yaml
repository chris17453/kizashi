{{- /*
Only rendered when secret.create is true (the default, for local/dev/demo installs). Production
installs should set `secret.create: false` and pre-create a Secret named per `secretName` (or
the "<fullname>-secrets" default — see _helpers.tpl) through their own secret-management
pipeline (External Secrets Operator, sealed-secrets, Vault injector, a manual `kubectl create
secret generic`, etc.) instead of letting Helm own real credentials in a values file.
*/ -}}
{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kizashi.secretName" . }}
  labels:
    {{- include "kizashi.labels" . | nindent 4 }}
  annotations:
    kizashi.io/note: >-
      Rendered from values.yaml `secrets:` placeholders by templates/secret.yaml. Override every
      key with real credentials via -f/--set before using this outside local/dev, or set
      secret.create=false and manage this Secret out-of-band entirely.
type: Opaque
stringData:
  {{- range $key, $value := .Values.secrets }}
  {{ $key }}: {{ toString $value | quote }}
  {{- end }}
{{- end }}
